<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <title>靈魂測驗</title>
  <style>
    body {
      background: #111;
      color: white;
      font-family: sans-serif;
      padding: 20px;
      text-align: center;
    }
    .progress-bar-wrapper {
      width: 80%;
      height: 12px;
      background: #444;
      border-radius: 6px;
      margin: 20px auto;
    }
    .progress-bar-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(to right, #00ffff, #0077ff);
      transition: width 0.4s ease;
    }
    .options button {
      background: #fff;
      color: #000;
      border: none;
      padding: 10px 20px;
      margin: 10px;
      border-radius: 6px;
      cursor: pointer;
    }
    #backBtn {
      margin-top: 30px;
      background: transparent;
      border: 1px solid #888;
      color: #888;
      padding: 8px 16px;
      border-radius: 6px;
      cursor: pointer;
    }
  </style>
  <script src="script.js" defer></script>
</head>
<body>
  <h1>這是一場靈魂旅程</h1>
  <div class="progress-bar-wrapper">
    <div class="progress-bar-fill" id="progress-fill"></div>
  </div>
  <div id="question" style="margin-top: 40px;">載入中...</div>
  <div class="options" id="options"></div>
  <div id="progress" style="margin-top: 30px;"></div>
  <button id="backBtn" onclick="goBack()" style="display:none;">返回上一題</button>
</body>
</html>
